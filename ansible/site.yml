- name: Provision Terrarium host
  hosts: terrarium
  become: true
  gather_facts: true
  vars:
    terrarium_repo_dir: /opt/terrarium
    terrarium_config_path: /etc/terrarium/config.yaml
    terrarium_state_dir: /var/lib/terrarium
    terrarium_lxd_pool_name: terrarium
    terrarium_storage_mode: loop
    terrarium_storage_source: ""
    terrarium_storage_size: ""
    terrarium_public_ip: "{{ ansible_default_ipv4.address }}"
    terrarium_root_domain: ""
    terrarium_manage_domain: "{{ ('manage.' ~ terrarium_root_domain) if terrarium_root_domain else ('manage.' ~ (terrarium_public_ip | replace('.', '-')) ~ '.traefik.me') }}"
    terrarium_lxd_domain: "{{ ('lxd.' ~ terrarium_root_domain) if terrarium_root_domain else ('lxd.' ~ (terrarium_public_ip | replace('.', '-')) ~ '.traefik.me') }}"
    terrarium_idp_mode: none
    terrarium_auth_domain: "{{ (('auth.' ~ terrarium_root_domain) if terrarium_root_domain else ('auth.' ~ (terrarium_public_ip | replace('.', '-')) ~ '.traefik.me')) if terrarium_idp_mode == 'zitadel_self_hosted' else '' }}"
    terrarium_zitadel_admin_email: "{{ terrarium_email }}"
    terrarium_email: ""
    terrarium_enable_s3: false
    terrarium_s3_endpoint: https://s3.amazonaws.com
    terrarium_s3_bucket: ""
    terrarium_s3_region: us-east-1
    terrarium_s3_prefix: terrarium
    terrarium_s3_access_key: ""
    terrarium_s3_secret_key: ""
    terrarium_enable_syncoid: false
    terrarium_syncoid_target: ""
    terrarium_syncoid_target_dataset: ""
    terrarium_syncoid_ssh_key: /root/.ssh/id_ed25519
    terrarium_config_bundle:
      terrarium_repo_dir: "{{ terrarium_repo_dir }}"
      terrarium_config_path: "{{ terrarium_config_path }}"
      terrarium_state_dir: "{{ terrarium_state_dir }}"
      terrarium_public_ip: "{{ terrarium_public_ip }}"
      terrarium_root_domain: "{{ terrarium_root_domain }}"
      terrarium_email: "{{ terrarium_email }}"
      terrarium_manage_domain: "{{ terrarium_manage_domain }}"
      terrarium_lxd_domain: "{{ terrarium_lxd_domain }}"
      terrarium_idp_mode: "{{ terrarium_idp_mode }}"
      terrarium_auth_domain: "{{ terrarium_auth_domain }}"
      terrarium_zitadel_admin_email: "{{ terrarium_zitadel_admin_email }}"
      terrarium_lxd_pool_name: "{{ terrarium_lxd_pool_name }}"
      terrarium_storage_mode: "{{ terrarium_storage_mode }}"
      terrarium_storage_source: "{{ terrarium_storage_source }}"
      terrarium_storage_size: "{{ terrarium_storage_size }}"
      terrarium_enable_s3: "{{ terrarium_enable_s3 }}"
      terrarium_s3_endpoint: "{{ terrarium_s3_endpoint }}"
      terrarium_s3_bucket: "{{ terrarium_s3_bucket }}"
      terrarium_s3_region: "{{ terrarium_s3_region }}"
      terrarium_s3_prefix: "{{ terrarium_s3_prefix }}"
      terrarium_s3_access_key: "{{ terrarium_s3_access_key }}"
      terrarium_s3_secret_key: "{{ terrarium_s3_secret_key }}"
      terrarium_enable_syncoid: "{{ terrarium_enable_syncoid }}"
      terrarium_syncoid_target: "{{ terrarium_syncoid_target }}"
      terrarium_syncoid_target_dataset: "{{ terrarium_syncoid_target_dataset }}"
      terrarium_syncoid_ssh_key: "{{ terrarium_syncoid_ssh_key }}"
  pre_tasks:
    - name: Assert Ubuntu 24.04
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Ubuntu"
          - ansible_distribution_version == '24.04'
        fail_msg: Terrarium v1 supports Ubuntu 24.04 only.
  roles:
    - role: base
    - role: zfs
    - role: lxd
    - role: cockpit
    - role: cockpit_plugins
    - role: traefik
    - role: idp_zitadel
    - role: backups
    - role: hardening
