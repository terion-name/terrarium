- name: Apply dev-sec OS hardening
  ansible.builtin.include_role:
    name: devsec.hardening.os_hardening
  vars:
    sysctl_overwrite: "{{ terrarium_hardening_sysctl_overwrite }}"
    os_firewall: "{{ terrarium_hardening_os_firewall }}"
    manage_ufw: "{{ terrarium_hardening_manage_ufw }}"

- name: Apply dev-sec SSH hardening
  ansible.builtin.include_role:
    name: devsec.hardening.ssh_hardening
  vars:
    ssh_permit_root_login: "{{ terrarium_hardening_ssh_permit_root_login }}"
    ssh_server_password_login: "{{ terrarium_hardening_ssh_server_password_login }}"
    ssh_use_pam: "{{ terrarium_hardening_ssh_use_pam }}"
    ssh_client_alive_interval: "{{ terrarium_hardening_ssh_client_alive_interval }}"
    ssh_client_alive_count: "{{ terrarium_hardening_ssh_client_alive_count }}"
    ssh_max_auth_retries: "{{ terrarium_hardening_ssh_max_auth_retries }}"
