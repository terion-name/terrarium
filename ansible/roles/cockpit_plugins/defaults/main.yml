terrarium_cockpit_plugin_runtime_deps:
  - jq
  - moreutils
  - msmtp
  - python3-botocore
  - python3-dateutil
  - python3-libzfs
  - rsync
  - sqlite3

terrarium_cockpit_plugin_build_deps:
  - build-essential
  - git
  - make
  - nodejs
  - npm

terrarium_cockpit_plugin_bundle_enabled: true
terrarium_cockpit_plugin_bundle_repo: terion-name/terrarium
terrarium_cockpit_plugin_bundle_main_ref: cockpit-plugins-main

terrarium_cockpit_zfs_repo: https://github.com/45Drives/cockpit-zfs.git
terrarium_cockpit_zfs_ref: v1.2.21-3
terrarium_cockpit_s3_repo: https://github.com/45Drives/cockpit-S3ObjectBroswer.git
terrarium_cockpit_s3_ref: v1.1.0-6
