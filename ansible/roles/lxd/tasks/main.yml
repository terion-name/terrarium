- name: Install LXD snap
  ansible.builtin.command: "snap install lxd --channel={{ terrarium_lxd_snap_channel }}"
  args:
    creates: /snap/bin/lxd

- name: Enable LXD UI
  ansible.builtin.command: snap set lxd ui.enable=true
  changed_when: false

- name: Wait for LXD unix socket
  ansible.builtin.wait_for:
    path: /var/snap/lxd/common/lxd/unix.socket
    timeout: 120

- name: Check whether LXD storage pool exists
  ansible.builtin.command: /snap/bin/lxc storage show {{ terrarium_lxd_pool_name }}
  register: terrarium_lxd_storage_pool
  failed_when: false
  changed_when: false

- name: Render LXD preseed
  ansible.builtin.template:
    src: lxd-preseed.yml.j2
    dest: "{{ terrarium_state_dir }}/lxd-preseed.yml"
    mode: "0600"

- name: Initialize LXD with ZFS pool
  ansible.builtin.shell: "/snap/bin/lxd init --preseed < {{ terrarium_state_dir }}/lxd-preseed.yml"
  args:
    executable: /bin/bash
  when: terrarium_lxd_storage_pool.rc != 0

- name: Pin LXD API to loopback
  ansible.builtin.command: /snap/bin/lxc config set core.https_address 127.0.0.1:8443
  changed_when: false

- name: Allow LXD bridge DHCP and DNS through UFW
  community.general.ufw:
    rule: allow
    direction: in
    interface: lxdbr0
    proto: "{{ item.proto }}"
    port: "{{ item.port }}"
  loop:
    - { port: "67", proto: "udp" }
    - { port: "53", proto: "udp" }
    - { port: "53", proto: "tcp" }

- name: Allow routed LXD bridge egress through UFW
  community.general.ufw:
    rule: allow
    route: true
    interface_in: lxdbr0
    interface_out: "{{ ansible_default_ipv4.interface }}"

- name: Configure ACME email when custom domain is used
  ansible.builtin.command: "/snap/bin/lxc config set acme.email {{ terrarium_acme_email }}"
  when:
    - terrarium_acme_email | length > 0
    - not terrarium_lxd_domain.endswith('.traefik.me')
  changed_when: false

- name: Configure ACME domain when custom domain is used
  ansible.builtin.command: "/snap/bin/lxc config set acme.domain {{ terrarium_lxd_domain }}"
  when:
    - terrarium_acme_email | length > 0
    - not terrarium_lxd_domain.endswith('.traefik.me')
  changed_when: false

- name: Configure OIDC issuer when provided
  ansible.builtin.command: "/snap/bin/lxc config set oidc.issuer {{ terrarium_oidc_issuer }}"
  when: terrarium_oidc_issuer | length > 0
  changed_when: false

- name: Configure LXD OIDC groups claim when provided
  ansible.builtin.command: "/snap/bin/lxc config set oidc.groups.claim {{ terrarium_lxd_oidc_groups_claim }}"
  when:
    - terrarium_oidc_issuer | length > 0
    - terrarium_lxd_oidc_groups_claim | length > 0
  changed_when: false

- name: Read ZITADEL outputs for LXD local client configuration
  ansible.builtin.slurp:
    src: "{{ terrarium_zitadel_outputs_path }}"
  register: terrarium_lxd_zitadel_outputs_raw
  when:
    - terrarium_idp_mode == 'local'
    - terrarium_zitadel_outputs_path is defined

- name: Parse ZITADEL outputs for LXD local client configuration
  ansible.builtin.set_fact:
    terrarium_lxd_zitadel_outputs: "{{ terrarium_lxd_zitadel_outputs_raw.content | b64decode | from_json }}"
  when:
    - terrarium_idp_mode == 'local'
    - terrarium_lxd_zitadel_outputs_raw is defined
    - terrarium_lxd_zitadel_outputs_raw.content is defined

- name: Resolve LXD OIDC client ID
  ansible.builtin.set_fact:
    terrarium_lxd_oidc_client_id_effective: >-
      {{
        (
          terrarium_lxd_zitadel_outputs.lxd_client_id.value
          if terrarium_idp_mode == 'local'
          else terrarium_oidc_client_id
        ) | default('', true)
      }}

- name: Configure OIDC client ID when provided
  ansible.builtin.command: "/snap/bin/lxc config set oidc.client.id {{ terrarium_lxd_oidc_client_id_effective }}"
  when:
    - terrarium_lxd_oidc_client_id_effective | length > 0
  changed_when: false

- name: Configure OIDC client secret when provided
  ansible.builtin.command: "/snap/bin/lxc config set oidc.client.secret {{ terrarium_oidc_client_secret }}"
  when:
    - terrarium_idp_mode == 'oidc'
    - terrarium_oidc_client_secret | length > 0
  changed_when: false

- name: Clear external OIDC client secret when using local IDP
  ansible.builtin.command: /snap/bin/lxc config unset oidc.client.secret
  when: terrarium_idp_mode == 'local'
  changed_when: false
  failed_when: false

- name: Check whether LXD management auth group exists
  ansible.builtin.command: /snap/bin/lxc auth group show {{ terrarium_lxd_auth_group }}
  register: terrarium_lxd_auth_group_raw
  failed_when: false
  changed_when: false

- name: Create LXD management auth group
  ansible.builtin.command: /snap/bin/lxc auth group create {{ terrarium_lxd_auth_group }}
  when: terrarium_lxd_auth_group_raw.rc != 0

- name: Ensure LXD management auth group has server admin entitlement
  ansible.builtin.command: /snap/bin/lxc auth group permission add {{ terrarium_lxd_auth_group }} server admin
  register: terrarium_lxd_admin_permission_add
  failed_when:
    - terrarium_lxd_admin_permission_add.rc != 0
    - "'already' not in (terrarium_lxd_admin_permission_add.stderr | lower)"
    - "'already' not in (terrarium_lxd_admin_permission_add.stdout | lower)"
  changed_when: terrarium_lxd_admin_permission_add.rc == 0
  when: terrarium_admin_group | length > 0

- name: Read previous LXD IdP group mapping
  ansible.builtin.slurp:
    src: "{{ terrarium_lxd_idp_group_state_path }}"
  register: terrarium_lxd_previous_idp_group_raw
  failed_when: false
  changed_when: false
  when: terrarium_admin_group | length > 0

- name: Parse previous LXD IdP group mapping
  ansible.builtin.set_fact:
    terrarium_lxd_previous_idp_group: "{{ terrarium_lxd_previous_idp_group_raw.content | default('') | b64decode | trim }}"
  when:
    - terrarium_admin_group | length > 0
    - terrarium_lxd_previous_idp_group_raw is defined

- name: Remove stale LXD IdP group mapping
  ansible.builtin.command: /snap/bin/lxc auth identity-provider-group delete {{ terrarium_lxd_previous_idp_group }}
  failed_when: false
  changed_when: terrarium_lxd_previous_idp_group | length > 0 and terrarium_lxd_previous_idp_group != terrarium_admin_group
  when:
    - terrarium_admin_group | length > 0
    - terrarium_lxd_previous_idp_group is defined
    - terrarium_lxd_previous_idp_group | length > 0
    - terrarium_lxd_previous_idp_group != terrarium_admin_group

- name: Check whether current LXD IdP group mapping exists
  ansible.builtin.command: /snap/bin/lxc auth identity-provider-group show {{ terrarium_admin_group }}
  register: terrarium_lxd_idp_group_raw
  failed_when: false
  changed_when: false
  when: terrarium_admin_group | length > 0

- name: Create current LXD IdP group mapping
  ansible.builtin.command: /snap/bin/lxc auth identity-provider-group create {{ terrarium_admin_group }}
  when:
    - terrarium_admin_group | length > 0
    - terrarium_lxd_idp_group_raw.rc != 0

- name: Map current IdP group to LXD management group
  ansible.builtin.command: /snap/bin/lxc auth identity-provider-group group add {{ terrarium_admin_group }} {{ terrarium_lxd_auth_group }}
  register: terrarium_lxd_idp_group_add
  failed_when:
    - terrarium_lxd_idp_group_add.rc != 0
    - "'already' not in (terrarium_lxd_idp_group_add.stderr | lower)"
    - "'already' not in (terrarium_lxd_idp_group_add.stdout | lower)"
  changed_when: terrarium_lxd_idp_group_add.rc == 0
  when: terrarium_admin_group | length > 0

- name: Persist current LXD IdP group mapping
  ansible.builtin.copy:
    content: "{{ terrarium_admin_group }}\n"
    dest: "{{ terrarium_lxd_idp_group_state_path }}"
    mode: "0600"
  when: terrarium_admin_group | length > 0

- name: Check whether terrarium profile exists
  ansible.builtin.command: /snap/bin/lxc profile show terrarium
  register: terrarium_lxd_profile
  failed_when: false
  changed_when: false

- name: Render terrarium profile
  ansible.builtin.template:
    src: terrarium-profile.yml.j2
    dest: "{{ terrarium_state_dir }}/terrarium-profile.yml"
    mode: "0600"

- name: Create terrarium profile
  ansible.builtin.command: /snap/bin/lxc profile create terrarium
  when: terrarium_lxd_profile.rc != 0

- name: Apply terrarium profile
  ansible.builtin.shell: "/snap/bin/lxc profile edit terrarium < {{ terrarium_state_dir }}/terrarium-profile.yml"
  args:
    executable: /bin/bash
